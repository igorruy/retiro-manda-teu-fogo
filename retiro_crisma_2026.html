<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retiro de Crisma 2026 — Manda teu Fogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0b1b2f;
  --paper: #fbfcff;
  --cream: #eef2f9;
  --gold: #f5851f;
  --gold-light: #ffb870;
  --gold-pale: #fff1e4;
  --accent: #1457c7;
  --muted: #5b6779;
  --line: rgba(11,27,47,0.12);
  --r: 10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: 0.5;
}

/* HEADER */
.site-header {
  position: relative; padding: 2.75rem 2rem 2.25rem;
  border-bottom: 1px solid var(--line); text-align: center; overflow: hidden;
  background:
    radial-gradient(900px 340px at 50% -10%, rgba(20,87,199,0.14), transparent 65%),
    radial-gradient(800px 320px at 50% 0%, rgba(245,133,31,0.18), transparent 60%),
    linear-gradient(180deg, rgba(238,242,249,0.9), rgba(251,252,255,1));
}
.site-header::after {
  content: ''; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%);
  width: 80px; height: 2px; background: var(--gold);
}
.brand {
  display: grid;
  place-items: center;
  gap: 0.5rem;
  margin-bottom: 0.75rem;
}
.brand img {
  width: min(280px, 80vw);
  height: auto;
  display: block;
  filter: drop-shadow(0 10px 24px rgba(11,27,47,0.18));
}
.eyebrow { font-size: 10px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.75rem; }
.site-header h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 5vw, 3.8rem); font-weight: 300; line-height: 1.1; color: var(--ink); letter-spacing: -0.01em; }
.site-header h1 em { font-style: italic; color: var(--accent); }
.site-header .subtitle { margin-top: 0.75rem; font-size: 14px; color: var(--muted); letter-spacing: 0.04em; }

/* MAIN */
.main { position: relative; z-index: 1; max-width: 920px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }

/* CONTROLS */
.controls { display: flex; flex-direction: column; gap: 1.25rem; margin-bottom: 2.5rem; }
.control-group { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
.control-label { font-size: 10px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); min-width: 52px; }

.day-tabs { display: flex; gap: 0; border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; background: var(--cream); }
.day-tab { padding: 10px 22px; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; cursor: pointer; border: none; background: transparent; color: var(--muted); transition: all 0.2s; border-right: 1px solid var(--line); font-family: 'DM Sans', sans-serif; }
.day-tab:last-child { border-right: none; }
.day-tab:hover { background: var(--gold-pale); color: var(--ink); }
.day-tab.active { background: var(--accent); color: #fff; }

.team-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.team-pill { padding: 8px 16px; border-radius: 99px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--line); background: transparent; color: var(--muted); transition: all 0.2s; font-family: 'DM Sans', sans-serif; letter-spacing: 0.02em; }
.team-pill:hover { border-color: var(--gold); color: var(--ink); background: var(--gold-pale); }
.team-pill.active { border-color: transparent; color: var(--paper); font-weight: 500; }

.toggle-pair { display: flex; gap: 0; border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; background: var(--cream); }
.toggle-btn { padding: 9px 16px; font-size: 12px; font-weight: 600; letter-spacing: 0.05em; cursor: pointer; border: none; background: transparent; color: var(--muted); transition: all 0.2s; border-right: 1px solid var(--line); font-family: 'DM Sans', sans-serif; }
.toggle-btn:last-child { border-right: none; }
.toggle-btn:hover { background: var(--gold-pale); color: var(--ink); }
.toggle-btn.active { background: var(--accent); color: #fff; }

/* STAT BAR */
.stat-bar { display: flex; gap: 1.5rem; padding: 1rem 1.25rem; background: var(--cream); border: 1px solid var(--line); border-radius: var(--r); margin-bottom: 1.75rem; flex-wrap: wrap; align-items: center; }
.stat { display: flex; flex-direction: column; }
.stat-num { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 600; line-height: 1; color: var(--ink); }
.stat-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
.stat-team { margin-left: auto; text-align: right; }
.stat-team .stat-num { font-size: 1rem; letter-spacing: 0.02em; }

/* LEGEND */
.legend { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

/* SECTION DIVIDER */
.section-divider { display: flex; align-items: center; gap: 1rem; margin: 0 0 1.5rem; }
.section-divider span { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 500; color: var(--gold); white-space: nowrap; }
.section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--line); }

/* SCHEDULE GRID */
.schedule-wrap { border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; background: #fff; animation: fadeIn 0.3s ease; }
.schedule-table { width: 100%; border-collapse: separate; border-spacing: 0; }
.schedule-table thead th { background: var(--cream); border-bottom: 1px solid var(--line); padding: 12px 12px; font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); text-align: left; }
.schedule-table thead th.col-time { width: 92px; text-align: right; }
.schedule-table tbody td { padding: 12px 12px; vertical-align: top; border-bottom: 1px solid rgba(11,27,47,0.08); }
.schedule-table tbody tr:last-child td { border-bottom: none; }

.time-cell { padding: 12px 10px; text-align: right; font-variant-numeric: tabular-nums; color: var(--muted); font-size: 12px; white-space: nowrap; }
.time-stack strong { display: block; font-size: 13px; font-weight: 800; color: var(--ink); letter-spacing: 0.01em; }
.time-stack span { font-weight: 600; }

.gcell { background: linear-gradient(180deg, rgba(255,241,228,0.35), rgba(255,241,228,0.12)); }
.ecell { background: #fff; border-left: 1px dashed rgba(11,27,47,0.14); }
.empty-cell { color: transparent; }
.empty-cell::selection { background: transparent; }
.filled { padding: 0 !important; }
.filled { position: relative; }
.filled > .block { position: absolute; inset: 0; padding: 12px 12px; }
.block { display: block; }
.block-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
.block-time { font-size: 12px; font-weight: 800; color: var(--muted); white-space: nowrap; letter-spacing: 0.02em; }

.cell-main { font-size: 14px; line-height: 1.35; font-weight: 600; color: var(--ink); }
.cell-sub { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; }
.tag { font-size: 12px; color: var(--muted); background: var(--cream); border-radius: 999px; padding: 4px 10px; }
.muted { color: var(--muted); font-weight: 500; }
.team-mark { border-left: 4px solid transparent; border-radius: 8px; padding-left: 10px; }
.team-mark .cell-main { font-weight: 700; }

body.hide-general .col-general { display: none; }
body.hide-general .ecell { border-left: none; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* EMPTY */
.empty-state { text-align: center; padding: 4rem 1rem; }
.empty-icon { font-family: 'Cormorant Garamond', serif; font-size: 3rem; color: var(--gold-light); line-height: 1; margin-bottom: 1rem; }
.empty-state p { font-size: 14px; color: var(--muted); font-style: italic; }

/* FOOTER */
.site-footer { text-align: center; padding: 1.5rem; font-size: 11px; color: var(--muted); letter-spacing: 0.06em; border-top: 1px solid var(--line); position: relative; z-index: 1; }

button:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
}

@media (max-width: 720px) {
  .site-header { padding: 2.25rem 1.1rem 1.5rem; }
  .main { padding: 1.25rem 0.9rem 4rem; }
  .controls { gap: 1rem; }
  .control-label { width: 100%; min-width: 0; }
  .day-tabs, .toggle-pair { width: 100%; }
  .day-tab { flex: 1; padding: 10px 12px; }
  .stat-bar { gap: 1rem; padding: 0.9rem 1rem; }
  .stat-team { margin-left: 0; text-align: left; }
  .schedule-table thead { display: none; }
  .schedule-table, .schedule-table tbody, .schedule-table tr, .schedule-table td { display: block; width: 100%; }
  .schedule-table tbody td { border-bottom: none; }
  .schedule-table tbody tr { border-bottom: 1px solid rgba(11,27,47,0.08); }
  .schedule-table tbody tr:last-child { border-bottom: none; }
  .time-cell { text-align: left; display: flex; justify-content: space-between; align-items: baseline; gap: 10px; background: var(--cream); border-bottom: 1px solid rgba(11,27,47,0.08); }
  .time-stack strong { display: inline; }
  .gcell, .ecell { padding: 12px 12px; }
  .ecell { border-left: none; border-top: 1px dashed rgba(11,27,47,0.14); }
  .cell-main { font-size: 15px; }
  body.hide-general .time-cell { border-bottom: none; }
  body.hide-general .ecell { border-top: none; }
}
</style>
</head>

</main>

let activeDay = 'Sexta';

function hexRgba(h, a) {
  const r=parseInt(h.slice(1,3),16), g=parseInt(h.slice(3,5),16), b=parseInt(h.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function buildPills() {
  const c = document.getElementById('teamPills'); c.innerHTML = '';
  TEAMS.forEach(t => {
    const p = document.createElement('button');
    p.className = 'team-pill' + (t.key===activeTeam.key?' active':'');
    p.textContent = t.label;
    if (t.key===activeTeam.key) { p.style.background=t.color; p.style.borderColor=t.color; }
    p.onclick = () => { activeTeam=t; render(); };
    c.appendChild(p);
  });
}

function buildBlockIndex(blocks, n) {
  const skip = Array(n).fill(false);
  const start = new Map();
  blocks.forEach(b => {
    start.set(b.s, b);
    for (let i = b.s + 1; i <= b.e; i++) skip[i] = true;
  });
  return { skip, start };
}

function buildCoverText(blocks, n) {
  const cover = Array(n).fill('');
  blocks.forEach(b => {
    for (let i = b.s; i <= b.e; i++) cover[i] = b.text;
  });
  return cover;
}

function buildCoverBounds(cover) {
  const n = cover.length;
  const start = Array(n).fill(0);
  const end = Array(n).fill(0);

  let i = 0;
  while (i < n) {
    const t = cover[i];
    let j = i;
    while (j + 1 < n && cover[j + 1] === t) j++;
    for (let k = i; k <= j; k++) {
      start[k] = i;
      end[k] = j;
    }
    i = j + 1;
  }

  return { start, end };
}

          tdGen.classList.add('filled');
          tdGen.rowSpan = (b.e - b.s + 1);
          const loc = localCover[b.s];
          const range = `${rows[b.s].ini}–${rows[b.e].fim || rows[b.e].ini || '—'}`;
          let h = `<div class="block"><div class="block-head"><span class="block-time">${range}</span></div><div class="cell-main">${b.text ? b.text : '<span class=\"muted\">—</span>'}</div>`;
          const meta = [];
          if (loc) meta.push(`<span class="tag">📍 ${loc}</span>`);
          if (meta.length) h += `<div class="cell-sub">${meta.join('')}</div>`;
          h += `</div>`;
          tdGen.innerHTML = h;
        } else {
          tdGen.classList.add('empty-cell');
          tdGen.innerHTML = '&nbsp;';
        }
        tr.appendChild(tdGen);
      }
    }

    if (!teamIdx.skip[i]) {
      const tdTeam = document.createElement('td');
      tdTeam.className = 'ecell col-team';

      const b = teamIdx.start.get(i);
      if (b) {
        tdTeam.classList.add('filled');
        tdTeam.rowSpan = (b.e - b.s + 1);
        const mark = document.createElement('div');
        mark.className = 'team-mark block';
        mark.style.borderLeftColor = activeTeam.color;
        mark.style.background = hexRgba(activeTeam.color, 0.045);

        const loc = localCover[b.s];
        const range = `${rows[b.s].ini}–${rows[b.e].fim || rows[b.e].ini || '—'}`;
        let h = `<div class="block-head"><span class="block-time">${range}</span></div><div class="cell-main" style="color:${activeTeam.color}">${b.text ? b.text : '<span class=\"muted\">—</span>'}</div>`;
        const meta = [];
        if (loc) meta.push(`<span class="tag">📍 ${loc}</span>`);
        if (meta.length) h += `<div class="cell-sub">${meta.join('')}</div>`;
        mark.innerHTML = h;
        tdTeam.appendChild(mark);
      } else {
        tdTeam.classList.add('empty-cell');
        tdTeam.innerHTML = '&nbsp;';
      }
      tr.appendChild(tdTeam);
    }

    tbody.appendChild(tr);
    rendered++;
  }

  if (rendered === 0) {
    tbody.innerHTML = `<tr><td colspan="${showGen ? 3 : 2}"><div class="empty-state"><div class="empty-icon">✦</div><p>Nenhuma atividade encontrada para esta seleção.</p></div></td></tr>`;
  }
}

document.querySelectorAll('.day-tab').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.day-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); activeDay=btn.dataset.day; render();
  };
});

document.getElementById('btnShow').onclick = () => {
  showGen=true;
  document.body.classList.remove('hide-general');
  document.getElementById('btnShow').classList.add('active');
  document.getElementById('btnHide').classList.remove('active');
  render();
};
document.getElementById('btnHide').onclick = () => {
  showGen=false;
  document.body.classList.add('hide-general');
  document.getElementById('btnHide').classList.add('active');
  document.getElementById('btnShow').classList.remove('active');
  render();
};

let lastMobile = window.matchMedia('(max-width: 720px)').matches;
window.addEventListener('resize', () => {
  const now = window.matchMedia('(max-width: 720px)').matches;
  if (now !== lastMobile) {
    lastMobile = now;
    render();
  }
});

render();
</script>
</body>
</html>
